<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore a painting by Mario — artist statement, details, and story behind the work.">
  <title>Mario — Painting</title>

  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/painting.css">

  <style>
    :root { --painting-glow: rgba(74,122,170,0.12); }
    .painting-ambient-bg {
      background:
        radial-gradient(ellipse 65% 55% at 40% 50%, rgba(74,122,170,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0a0810 0%, #050507 100%);
      will-change: opacity;
      transform: translateZ(0);
      pointer-events: none;
    }

    .story-section,
    .quote-section {
      opacity: 0;
      transform: translateY(24px);
      transition:
        opacity  1.1s cubic-bezier(0.22, 1, 0.36, 1),
        transform 1.1s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .story-section.in-view,
    .quote-section.in-view {
      opacity: 1;
      transform: translateY(0);
    }
    .painting-nav {
      opacity: 0;
      transition: opacity 0.9s ease 0.1s;
    }
    .painting-nav.in-view { opacity: 1; }
  </style>

  <script src="js/paintings-manifest.js"></script>
  <script>
    (function() {
      var p = new URLSearchParams(location.search);
      var id = p.get('id') || (typeof PAINTINGS !== 'undefined' ? PAINTINGS[0].id : '');
      if (!id) return;

      var idx = typeof PAINTINGS !== 'undefined'
        ? PAINTINGS.findIndex(function(x){ return x.id === id; })
        : -1;

      if (idx === -1) return;

      var painting = PAINTINGS[idx];
      document.title = painting.title + ' — Mario';
      document.documentElement.dataset.paintingIdx = idx;
      document.documentElement.dataset.paintingId = id;

      var preload = document.createElement('link');
      preload.rel = 'preload';
      preload.as = 'image';
      preload.href = painting.image || ('paintings/' + id + '/main.jpg');
      preload.setAttribute('fetchpriority', 'high');
      document.head.appendChild(preload);
    })();
  </script>
</head>
<body>

  <div class="painting-ambient-bg" id="ambient-bg"></div>
  <div id="ambient-motifs" aria-hidden="true"></div>

  <nav class="gothic-nav">
    <a href="index.html" class="nav-logo">mariothesmart</a>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="exhibition.html">Exhibition</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <div class="painting-page" id="painting-page">

    <nav class="breadcrumb" aria-label="breadcrumb">
      <a href="index.html">Home</a>
      <span class="sep" aria-hidden="true">·</span>
      <a href="gallery.html">Gallery</a>
      <span class="sep" aria-hidden="true">·</span>
      <span class="current" id="bc-title"></span>
    </nav>

    <div class="painting-hero">
      <div class="hero-frame-wrap">
        <div class="hero-frame" id="hero-frame">
          <div class="c tl"></div><div class="c tr"></div>
          <div class="c bl"></div><div class="c br"></div>
          <div class="hero-img-container" id="hero-img-container"
               data-artwork-container
               onclick="openZoom(document.getElementById('hero-img').src)"
               style="cursor:zoom-in;">
            <div class="hero-skeleton" id="hero-skeleton"></div>
            <img
              class="hero-img"
              id="hero-img"
              src=""
              alt=""
              fetchpriority="high"
              decoding="async"
              loading="eager"
              draggable="false"
              data-artwork-img
            >
          </div>
          <span class="zoom-hint">click to enlarge</span>
        </div>
      </div>

      <div class="hero-panel" id="hero-panel">
        <span class="panel-series" id="panel-series"></span>
        <h1 class="panel-title" id="panel-title"></h1>
        <p class="panel-category" id="panel-category" style="display:none;font-family:var(--font-italic);font-style:italic;font-weight:590;font-size:0.9rem;color:var(--bone-dim);margin-bottom:2.0rem;letter-spacing:0.001em;"></p>
        <div class="panel-rule"></div>
        <div class="panel-meta" id="panel-meta"></div>
        <p class="panel-intro" id="panel-intro" style="display:none;"></p>
        <button class="panel-zoom-btn"
                onclick="openZoom(document.getElementById('hero-img').src)">
          View full size
        </button>
      </div>
    </div>

    <div id="detail-sections"></div>

    <div class="story-section" id="story-section">
      <span class="story-label">The Story</span>
      <div class="story-rule"></div>
      <h3 class="story-title" id="story-title" style="display:none;font-family:var(--font-display);font-size:1.1rem;color:var(--pallor);margin-bottom:1.2rem;letter-spacing:0.04em;"></h3>
      <div class="story-text" id="story-text"></div>
    </div>

    <div class="quote-section" id="quote-section">
      <span class="quote-mark" aria-hidden="true">"</span>
      <p class="quote-text-el" id="quote-text"></p>
      <span class="quote-attr">— Mario</span>
    </div>

    <div class="painting-nav" id="painting-nav">
      <a class="pnav-link" id="prev-link" href="#">← Previous</a>
      <span class="pnav-count" id="pnav-count"></span>
      <a class="pnav-link" id="next-link" href="#">Next →</a>
    </div>

  </div>

  <div class="zoom-overlay" id="zoom-overlay" data-artwork-container onclick="closeZoom()">
    <button class="zoom-close" onclick="closeZoom()">Close</button>
    <img id="zoom-img" src="" alt="Full size view" loading="lazy" data-artwork-img draggable="false">
  </div>

  <script src="js/site.js"></script>

  <script>
    var paintingId = document.documentElement.dataset.paintingId || PAINTINGS[0].id;
    var paintingIndex = parseInt(document.documentElement.dataset.paintingIdx, 10);

    if (isNaN(paintingIndex) || paintingIndex === -1) {
      location.replace('gallery.html');
    }

    var fb = PAINTINGS[paintingIndex];
    var prev = PAINTINGS[(paintingIndex - 1 + PAINTINGS.length) % PAINTINGS.length];
    var next = PAINTINGS[(paintingIndex + 1) % PAINTINGS.length];

    var heroImg = document.getElementById('hero-img');
    var heroSkeleton = document.getElementById('hero-skeleton');
    var heroImgPath = fb.image || ('paintings/' + paintingId + '/main.jpg');

    heroImg.alt = fb.title;

    function showHeroLoaded() {
      heroImg.classList.add('loaded');
      if (heroSkeleton) heroSkeleton.classList.add('hidden');
    }

    function showHeroError() {
      if (heroSkeleton) {
        heroSkeleton.classList.add('hidden');
      }
      heroImg.style.opacity = '0.25';
    }

    heroImg.onload = showHeroLoaded;
    heroImg.onerror = showHeroError;

    heroImg.src = heroImgPath;

    if (heroImg.complete && heroImg.naturalWidth > 0) {
      showHeroLoaded();
    }

    // Mobile fallback: some mobile browsers don't reliably fire onload
    // when src is set dynamically. Force the image visible after a short delay
    // if it hasn't already been shown.
    setTimeout(function() {
      if (!heroImg.classList.contains('loaded') && heroImg.src && heroImg.src !== window.location.href) {
        showHeroLoaded();
      }
    }, 800);

    document.getElementById('bc-title').textContent = fb.title;
    document.getElementById('panel-series').textContent = fb.series || '';
    document.getElementById('panel-title').textContent = fb.title;

    function buildMetaRows(items) {
      var el = document.getElementById('panel-meta');
      el.innerHTML = '';
      items.forEach(function(m) {
        if (!m.value) return;
        el.innerHTML +=
          '<div class="panel-meta-row">' +
            '<span class="panel-meta-label">' + m.label + '</span>' +
            '<span class="panel-meta-value">' + m.value + '</span>' +
          '</div>';
      });
    }

    buildMetaRows([
      { label: 'Year', value: fb.year },
      { label: 'Medium', value: fb.medium },
      { label: 'Size', value: fb.dimensions },
      { label: 'Series', value: fb.series },
    ]);

    document.getElementById('prev-link').href = 'painting.html?id=' + prev.id;
    document.getElementById('next-link').href = 'painting.html?id=' + next.id;
    document.getElementById('pnav-count').textContent =
      (paintingIndex + 1) + ' / ' + PAINTINGS.length;

    // ── Single-pass render from manifest ──────────────────
    // Called after all var/function definitions below to ensure
    // PAINTING_MOTIFS and MOTIF_SVGS are defined before spawnMotifs runs.
    // (var declarations are hoisted as undefined; assignment happens at runtime)

    function enhancePage(data) {
      // data === fb (the full manifest entry). Always defined.
      // ── Ambient background colours ──────────────────────
      if (data.palette) {
        document.getElementById('ambient-bg').style.background =
          'radial-gradient(ellipse 65% 55% at 40% 50%, ' + data.palette.glow + ' 0%, transparent 65%),' +
          'radial-gradient(ellipse 50% 40% at 60% 60%, ' + data.palette.ice + ' 0%, transparent 55%),' +
          'radial-gradient(ellipse 100% 100% at 50% 50%, #0a0810 0%, #050507 100%)';
        document.documentElement.style.setProperty('--painting-glow', data.palette.glow);
      }

        // ── Category label (Self-portrait / Study / etc.) ───
        // Shown directly below the title when present.
        if (data.subtitle) {
          var catEl = document.getElementById('panel-category');
          if (catEl) {
            catEl.textContent = data.subtitle;
            catEl.style.display = '';
          }
        }

        // ── Meta table (re-render with full manifest data) ───
        buildMetaRows([
          { label: 'Year',   value: data.year },
          { label: 'Medium', value: data.medium },
          { label: 'Size',   value: data.dimensions },
          { label: 'Series', value: data.series },
        ]);

        // ── Short opener ────────────────────────────────────
        if (data.intro) {
          var introEl = document.getElementById('panel-intro');
          introEl.textContent = data.intro;
          introEl.style.display = '';
        }

        // ── Detail images ───────────────────────────────────
        // Only render if actual detail images exist.
        // No placeholders — the section is simply absent when empty.
        var container = document.getElementById('detail-sections');
        container.innerHTML = '';
        if (data.images && data.images.details && data.images.details.length) {
          data.images.details.forEach(function(detail, i) {
            var sec = document.createElement('div');
            sec.className = 'detail-section' + (i % 2 === 1 ? ' flip' : '') + ' scroll-reveal';
            var detailSrc = 'paintings/' + paintingId + '/' + detail.file;
            sec.innerHTML =
              '<div class="detail-img-wrap" data-artwork-container onclick="openZoom(\'' + detailSrc + '\')" style="cursor:zoom-in;">' +
                '<img src="' + detailSrc + '"' +
                     ' alt="' + (detail.caption || 'Detail') + '"' +
                     ' draggable="false"' +
                     ' data-artwork-img' +
                     ' loading="lazy" decoding="async">' +
              '</div>' +
              '<div class="detail-text">' +
                '<span class="detail-eyebrow">Detail · ' + String(i + 1).padStart(2, '0') + '</span>' +
                '<p class="detail-note">' + (detail.caption || '') + '</p>' +
              '</div>';
            container.appendChild(sec);
          });
        }

        // Apply protection to newly rendered detail images
        if (window._protectArtworkImages) window._protectArtworkImages();

        // ── Story text ──────────────────────────────────────
        if (data.story) {
          var storyEl = document.getElementById('story-text');
          storyEl.innerHTML = data.story
            .split('\n\n')
            .filter(function(p){ return p.trim(); })
            .map(function(p){ return '<p>' + p.trim() + '</p>'; })
            .join('');
        }

        // ── Story title ─────────────────────────────────────
        // Rendered as a heading above the story when present.
        // Currently: whos-watching-whom only.
        if (data.storyTitle) {
          var storyTitleEl = document.getElementById('story-title');
          if (storyTitleEl) {
            storyTitleEl.textContent = data.storyTitle;
            storyTitleEl.style.display = '';
          }
        }

        // ── Quote ───────────────────────────────────────────
        if (data.quote) {
          document.getElementById('quote-text').textContent = data.quote;
        }

        // ── Motifs ──────────────────────────────────────────
        spawnMotifs(data.motifs || ['👁']);

      initScrollReveals();
    }

    // ─── Per-painting custom motif SVGs ───────────────────────────────────────
    // Each painting has a hand-curated set of SVGs extracted from its visual
    // elements. The key is the painting id; fallback uses the generic MOTIF_SVGS
    // map below (keyed by the emoji/symbol strings stored in the manifest motifs array).
    var PAINTING_MOTIFS = {

      // Feelings — raven, laurel crown, snake coil, bleeding third eye
      'feelings': [
        // Raven silhouette (perching bird)
        '<svg viewBox="0 0 32 26" fill="none"><path d="M16 14C16 14 9 5 3 7C3 7 7 12 7 17C7 17 11 22 18 19C18 19 25 24 30 19C30 19 25 12 21 14C21 14 19 8 16 14Z" stroke="currentColor" stroke-width="1.1" fill="none"/><path d="M3 7C3 7 1 5 0 4" stroke="currentColor" stroke-width="0.9" stroke-linecap="round"/></svg>',
        // Bleeding eye (third eye)
        '<svg viewBox="0 0 36 28" fill="none"><path d="M2 14 C7 5,29 5,34 14 C29 23,7 23,2 14Z" stroke="currentColor" stroke-width="1.1" fill="none"/><circle cx="18" cy="14" r="4.5" stroke="currentColor" stroke-width="0.9" fill="none"/><circle cx="18" cy="14" r="1.8" fill="currentColor" opacity="0.75"/><line x1="18" y1="18.5" x2="17" y2="26" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/></svg>',
        // Laurel crown arc
        '<svg viewBox="0 0 36 20" fill="none"><path d="M2 16C2 16 6 8 10 6C10 6 8 12 10 14" stroke="currentColor" stroke-width="1" fill="none" stroke-linecap="round"/><path d="M34 16C34 16 30 8 26 6C26 6 28 12 26 14" stroke="currentColor" stroke-width="1" fill="none" stroke-linecap="round"/><path d="M10 6C14 3 22 3 26 6" stroke="currentColor" stroke-width="0.9" fill="none"/><path d="M14 4C16 2 20 2 22 4" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.5"/></svg>',
        // Snake coil
        '<svg viewBox="0 0 28 28" fill="none"><path d="M14 4C20 4 24 8 24 14C24 20 20 24 14 24C8 24 5 20 6 14C7 9 11 7 14 9C17 11 17 16 14 17C11 18 9 16 10 13" stroke="currentColor" stroke-width="1.1" fill="none" stroke-linecap="round"/><path d="M10 13C10 13 9 11 11 10" stroke="currentColor" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.6"/></svg>',
        // Tear drop (single tear from eye)
        '<svg viewBox="0 0 14 22" fill="none"><ellipse cx="7" cy="8" rx="4" ry="3" stroke="currentColor" stroke-width="0.9" fill="none" opacity="0.5"/><path d="M7 11C7 11 4 15 5 18C5.5 20 8.5 20 9 18C10 15 7 11 7 11Z" stroke="currentColor" stroke-width="1" fill="none"/></svg>'
      ],

      // Goddess of Death — decomposing face, dark halo, leaves falling, blood teeth, glasses
      'goddess-of-death': [
        // Bleeding eye (detailed — more decay feel)
        '<svg viewBox="0 0 36 28" fill="none"><path d="M2 14 C7 5,29 5,34 14 C29 23,7 23,2 14Z" stroke="currentColor" stroke-width="1.1" fill="none"/><circle cx="18" cy="14" r="5" stroke="currentColor" stroke-width="1" fill="none"/><circle cx="18" cy="14" r="2" fill="currentColor" opacity="0.7"/><line x1="17" y1="19" x2="15" y2="27" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/><line x1="19" y1="19" x2="20" y2="26" stroke="currentColor" stroke-width="0.7" stroke-linecap="round" opacity="0.35"/></svg>',
        // Dark halo arc
        '<svg viewBox="0 0 36 20" fill="none"><path d="M3 18C3 18 5 8 18 4C31 8 33 18 33 18" stroke="currentColor" stroke-width="1.1" fill="none" stroke-linecap="round"/><path d="M8 16C8 16 10 9 18 7C26 9 28 16 28 16" stroke="currentColor" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.4"/></svg>',
        // Falling leaf
        '<svg viewBox="0 0 18 24" fill="none"><path d="M9 2C9 2 16 8 14 16C12 20 9 22 9 22C9 22 6 20 4 16C2 8 9 2 9 2Z" stroke="currentColor" stroke-width="1" fill="none"/><line x1="9" y1="2" x2="9" y2="22" stroke="currentColor" stroke-width="0.7" opacity="0.4"/><path d="M9 10C9 10 13 12 14 16" stroke="currentColor" stroke-width="0.6" fill="none" opacity="0.35"/></svg>',
        // Blood drop
        '<svg viewBox="0 0 16 24" fill="none"><path d="M8 2C8 2 14 10 14 15C14 19.4 11.3 22 8 22C4.7 22 2 19.4 2 15C2 10 8 2 8 2Z" stroke="currentColor" stroke-width="1" fill="none"/></svg>',
        // Glasses (signature element of this figure)
        '<svg viewBox="0 0 40 26" fill="none"><rect x="2" y="6" width="16" height="14" rx="7" stroke="currentColor" stroke-width="1.1" fill="none"/><rect x="22" y="6" width="16" height="14" rx="7" stroke="currentColor" stroke-width="1.1" fill="none"/><line x1="18" y1="13" x2="22" y2="13" stroke="currentColor" stroke-width="1.1"/><line x1="2" y1="8" x2="0" y2="5" stroke="currentColor" stroke-width="1"/><line x1="38" y1="8" x2="40" y2="5" stroke="currentColor" stroke-width="1"/></svg>'
      ],

      // Guilt — speech bubble, checkerboard tile, blindfold, question mark, exposed brain lines
      'guilt': [
        // Speech bubble (rounded, blunt)
        '<svg viewBox="0 0 28 24" fill="none"><rect x="2" y="2" width="24" height="16" rx="4" stroke="currentColor" stroke-width="1" fill="none"/><path d="M8 18L6 22L12 18" stroke="currentColor" stroke-width="1" fill="none" stroke-linejoin="round"/></svg>',
        // Checkerboard tile (2×2)
        '<svg viewBox="0 0 20 20" fill="none"><rect x="0" y="0" width="10" height="10" stroke="currentColor" stroke-width="0.8" fill="currentColor" opacity="0.22"/><rect x="10" y="10" width="10" height="10" stroke="currentColor" stroke-width="0.8" fill="currentColor" opacity="0.22"/><rect x="0" y="0" width="20" height="20" stroke="currentColor" stroke-width="0.8" fill="none"/></svg>',
        // Question mark
        '<svg viewBox="0 0 18 26" fill="none"><path d="M4 7C4 4 6 2 9 2C12 2 14 4 14 7C14 10.5 9 12 9 16" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/><circle cx="9" cy="22" r="1.6" fill="currentColor" opacity="0.75"/></svg>',
        // Brain outline (organic looping form)
        '<svg viewBox="0 0 28 24" fill="none"><path d="M14 2C10 2 6 5 6 9C4 9 2 11 3 14C2 16 3 19 6 20C7 22 10 23 13 22C14 23 16 23 18 22C21 23 24 21 24 19C27 18 27 15 26 13C27 10 25 7 22 7C21 3 17 2 14 2Z" stroke="currentColor" stroke-width="1" fill="none"/><path d="M14 2C14 2 14 8 14 12" stroke="currentColor" stroke-width="0.7" fill="none" opacity="0.4"/><path d="M6 9C6 9 10 10 14 9" stroke="currentColor" stroke-width="0.6" fill="none" opacity="0.3"/></svg>',
        // Hexagon (floating shape from painting)
        '<svg viewBox="0 0 26 28" fill="none"><path d="M13 2L23 7.5V18.5L13 24L3 18.5V7.5Z" stroke="currentColor" stroke-width="1" fill="none"/></svg>'
      ],

      // The Devil's Death — skulls, snakes, roses, hands, waves, blood from eyes
      'the-devils-death': [
        // Skull (simplified frontal)
        '<svg viewBox="0 0 24 28" fill="none"><path d="M4 14C4 8 8 3 12 3C16 3 20 8 20 14C20 18 18 21 18 21L6 21C6 21 4 18 4 14Z" stroke="currentColor" stroke-width="1" fill="none"/><rect x="7" y="21" width="10" height="5" rx="1" stroke="currentColor" stroke-width="0.9" fill="none"/><line x1="10" y1="21" x2="10" y2="26" stroke="currentColor" stroke-width="0.8"/><line x1="14" y1="21" x2="14" y2="26" stroke="currentColor" stroke-width="0.8"/><circle cx="9" cy="14" r="2" stroke="currentColor" stroke-width="0.8" fill="none"/><circle cx="15" cy="14" r="2" stroke="currentColor" stroke-width="0.8" fill="none"/></svg>',
        // Snake (sinuous, longer)
        '<svg viewBox="0 0 28 32" fill="none"><path d="M6 28C6 28 10 32 15 28C20 24 14 17 19 12C24 7 27 11 27 11" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/><path d="M22 8C22 8 24 7 27 11" stroke="currentColor" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.5"/></svg>',
        // Rose (simplified — petals arc)
        '<svg viewBox="0 0 22 26" fill="none"><circle cx="11" cy="10" r="5" stroke="currentColor" stroke-width="1" fill="none"/><path d="M7 9C7 9 5 6 7 4C9 2 11 4 11 4" stroke="currentColor" stroke-width="0.8" fill="none"/><path d="M15 9C15 9 17 6 15 4C13 2 11 4 11 4" stroke="currentColor" stroke-width="0.8" fill="none"/><path d="M11 15C11 15 11 20 11 24" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><path d="M8 18C8 18 6 17 7 15" stroke="currentColor" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.5"/></svg>',
        // Blood drop from eye (eye with drip)
        '<svg viewBox="0 0 30 28" fill="none"><path d="M2 12 C7 4,23 4,28 12 C23 20,7 20,2 12Z" stroke="currentColor" stroke-width="1" fill="none"/><circle cx="15" cy="12" r="3.5" stroke="currentColor" stroke-width="0.9" fill="none"/><line x1="15" y1="15.5" x2="13" y2="26" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" opacity="0.6"/></svg>',
        // Wave (bottom of painting)
        '<svg viewBox="0 0 36 14" fill="none"><path d="M0 7C4 3 8 11 12 7C16 3 20 11 24 7C28 3 32 11 36 7" stroke="currentColor" stroke-width="1.1" fill="none" stroke-linecap="round"/></svg>'
      ],

      // The End Is Near — third eye, horns, halo glow, held eyeball, blood drip
      'the-end-is-near': [
        // Third eye bleeding
        '<svg viewBox="0 0 36 28" fill="none"><path d="M2 14 C7 5,29 5,34 14 C29 23,7 23,2 14Z" stroke="currentColor" stroke-width="1.1" fill="none"/><circle cx="18" cy="14" r="5" stroke="currentColor" stroke-width="1" fill="none"/><circle cx="18" cy="14" r="2" fill="currentColor" opacity="0.7"/><line x1="17" y1="19" x2="15" y2="28" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.6"/></svg>',
        // Horn (curved spike)
        '<svg viewBox="0 0 16 26" fill="none"><path d="M8 24C8 24 2 14 5 4C5 4 8 8 8 14C8 14 11 8 11 4C14 14 8 24 8 24Z" stroke="currentColor" stroke-width="1" fill="none" stroke-linejoin="round"/></svg>',
        // Halo arc (fiery, broken)

    function spawnMotifs(motifs) {
      var cont = document.getElementById('ambient-motifs');
      if (!cont || cont.childElementCount) return;

      // Use per-painting custom SVG set if available; otherwise build from manifest motif keys
      var customSet = PAINTING_MOTIFS[paintingId];
      var svgList;
      if (customSet && customSet.length) {
        svgList = customSet;
      } else {
        svgList = motifs.map(function(k) {
          return MOTIF_SVGS[k] || MOTIF_SVGS['_default'];
        });
      }

      // Spawn 7 motifs: distributes them across the full height for a richer field
      var count = 5;
      for (var i = 0; i < count; i++) {
        var svgHTML = svgList[i % svgList.length];
        var el = document.createElement('div');
        el.className = 'ambient-motif';
        el.innerHTML = svgHTML;
        // Size: slightly larger — 16–28px (was 12–21px)
        var sz = 16 + Math.random() * 12;
        // Stagger vertical start positions evenly so motifs are spread throughout scroll
        var bottomPct = 5 + (i / count) * 85 + (Math.random() * 8 - 4);
        el.style.cssText =
          'left:' + (4 + Math.random() * 92) + '%;' +
          'bottom:' + bottomPct + '%;' +
          'width:' + sz + 'px;height:' + sz + 'px;' +
          'color:rgba(220,210,198,0.82);' +
          'animation-duration:' + (30 + Math.random() * 20) + 's;' +
          'animation-delay:' + (Math.random() * 4) + 's;';
        cont.appendChild(el);
      }
    }

    function initScrollReveals() {
      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
          if (e.isIntersecting) {
            e.target.classList.add('in-view');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

      document.querySelectorAll('.scroll-reveal, .story-section, .quote-section, .painting-nav')
        .forEach(function(el) { io.observe(el); });
    }

    function openZoom(src) {
      if (!src || src.indexOf('/') === -1) return;
      document.getElementById('zoom-img').src = src;
      document.getElementById('zoom-overlay').classList.add('active');
      document.body.style.overflow = 'hidden';
      document.body.style.touchAction = 'none';
      var closeBtn = document.querySelector('.zoom-close');
      if (closeBtn) closeBtn.focus({ preventScroll: true });
    }

    function closeZoom() {
    	document.getElementById('zoom-overlay').classList.remove('active');
    	document.body.style.overflow = '';
   	document.body.style.touchAction = '';
      }

    window.openZoom = openZoom;
    window.closeZoom = closeZoom;

    document.addEventListener('keydown', function(e) {
      var zoomActive = document.getElementById('zoom-overlay').classList.contains('active');
      if (e.key === 'Escape') closeZoom();
      if (e.key === 'ArrowLeft'  && !zoomActive) location.href = 'painting.html?id=' + prev.id;
      if (e.key === 'ArrowRight' && !zoomActive) location.href = 'painting.html?id=' + next.id;
    });

    // ── Render all manifest-backed content ────────────────
    // Called here — after PAINTING_MOTIFS and MOTIF_SVGS are fully assigned —
    // so spawnMotifs() can access them without hitting undefined.
    enhancePage(fb);
